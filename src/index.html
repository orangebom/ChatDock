<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ChatDock</title>
    <script>
      (() => {
        const key = "ai-compare-theme";
        const stored = window.localStorage.getItem(key);
        const themeMode =
          stored === "light" || stored === "dark" || stored === "system"
            ? stored
            : "system";
        const resolvedTheme =
          themeMode === "system"
            ? window.matchMedia("(prefers-color-scheme: light)").matches
              ? "light"
              : "dark"
            : themeMode;
        document.documentElement.dataset.theme = resolvedTheme;
        document.documentElement.dataset.themeMode = themeMode;
        document.documentElement.style.colorScheme = resolvedTheme;
      })();
    </script>
    <link rel="stylesheet" href="./tailwind.css" />
    <link rel="stylesheet" href="./styles.css" />
    <script type="module" src="./main.ts" defer></script>
  </head>
  <body>
    <div id="vue-app" hidden></div>
    <main class="shell">
      <header class="topbar">
        <div class="topbar-left">
          <div id="page-tabs" class="page-tabs"></div>
        </div>
        <div class="topbar-center">
          <div class="layout-switcher">
            <button
              type="button"
              id="layout-preset-select"
              class="layout-preset-select"
              aria-haspopup="listbox"
              aria-expanded="false"
            >
              <span id="layout-preset-current" class="layout-preset-current">默认对比</span>
              <span class="layout-preset-caret" aria-hidden="true"></span>
            </button>
            <button
              type="button"
              id="layout-preset-more"
              class="ghost-button layout-preset-more"
              aria-label="布局更多操作"
              title="布局更多操作"
            >
              ⋯
            </button>
          </div>
        </div>
        <div class="topbar-actions">
          <div id="app-version" class="app-version topbar-version" aria-label="软件版本">--</div>
          <button type="button" id="open-onboarding" class="ghost-button" title="重新查看使用引导">引导</button>
          <button type="button" id="reload" class="ghost-button" title="刷新所有已选 AI">刷新</button>
          <button type="button" id="relayout" class="ghost-button" title="刷新当前页面布局">适配</button>
          <button
            type="button"
            id="theme-toggle"
            class="ghost-button theme-toggle"
            aria-label="切换到亮色主题"
            title="切换到亮色主题"
          >
            <span class="theme-indicator" aria-hidden="true"></span>
            <span id="theme-toggle-label">暗色</span>
          </button>
          <button type="button" id="open-about" class="ghost-button" title="关于 ChatDock">关于</button>
        </div>
      </header>

      <div id="layout-preset-menu" class="layout-preset-menu-shell" hidden>
        <div class="layout-preset-menu-backdrop" data-close-layout-preset-menu="true"></div>
        <section class="layout-preset-menu" role="menu" aria-label="布局操作">
          <button type="button" class="layout-preset-menu-item" data-layout-preset-action="save-as" role="menuitem">
            当前布局另存
          </button>
          <button type="button" class="layout-preset-menu-item" data-layout-preset-action="edit" role="menuitem">
            编辑布局
          </button>
        </section>
      </div>

      <section class="grid-preview" aria-hidden="true">
        <div id="layout-empty" class="layout-empty" hidden></div>
        <div id="panel-layer" class="panel-layer"></div>
        <div id="layout-handles" class="layout-handles" aria-hidden="true"></div>
      </section>

      <section class="compact-bar">
        <div class="compact-topline">
          <div id="global-targets" class="compact-targets"></div>
          <div class="compact-side">
            <button type="button" id="manage-sites" class="ghost-button compact-manage">编辑 AI</button>
          </div>
        </div>

        <form id="prompt-form" class="compact-form">
          <div id="prompt-dropzone" class="compact-input-stack" data-drag-active="false">
            <div id="prompt-attachments" class="prompt-attachments" hidden></div>
            <textarea
              id="prompt"
              rows="1"
              placeholder="向已选 AI 同时发送问题..."
            ></textarea>
          </div>
          <button type="submit" class="send-button compact-send" aria-label="发送问题">&gt;</button>
        </form>
      </section>

      <div id="site-manager" class="modal-shell" hidden>
        <div class="modal-backdrop" data-close-site-manager="true"></div>
        <section class="modal-card" role="dialog" aria-modal="true" aria-labelledby="site-manager-title">
          <header class="modal-header">
            <div>
              <h2 id="site-manager-title">编辑 AI</h2>
              <p>管理底部选择栏中显示的 AI，并通过拖拽调整它们的顺序。</p>
            </div>
            <button type="button" id="close-site-manager" class="ghost-button modal-close">关闭</button>
          </header>

          <div class="modal-body">
            <section class="manager-section">
              <div class="manager-heading">
                <h3>当前显示</h3>
                <span id="visible-sites-count" class="manager-count"></span>
              </div>
              <div id="visible-sites" class="manager-list"></div>
            </section>

            <section class="manager-section">
              <div class="manager-heading">
                <h3>可添加</h3>
                <span id="hidden-sites-count" class="manager-count"></span>
              </div>
              <div id="hidden-sites" class="manager-list manager-list-muted"></div>
            </section>
          </div>
        </section>
      </div>

      <div id="layout-presets" class="modal-shell" hidden>
        <div class="modal-backdrop" data-close-layout-presets="true"></div>
        <section class="modal-card layout-presets-card" role="dialog" aria-modal="true" aria-labelledby="layout-presets-title">
          <header class="modal-header">
            <div>
              <h2 id="layout-presets-title">布局</h2>
              <p>切换常用工作区，当前布局变化会自动保存到本地。</p>
            </div>
            <button type="button" id="close-layout-presets" class="ghost-button modal-close">关闭</button>
          </header>

          <div class="layout-presets-body">
            <div id="layout-presets-list" class="layout-presets-list"></div>
            <form id="layout-preset-form" class="layout-preset-form">
              <input
                id="layout-preset-name"
                type="text"
                maxlength="24"
                placeholder="新布局名称"
                autocomplete="off"
              />
              <button type="submit" class="ghost-button">另存为</button>
            </form>
          </div>
        </section>
      </div>

      <div id="close-confirm" class="modal-shell" hidden>
        <div class="modal-backdrop" data-close-confirm-backdrop="true"></div>
        <section
          class="modal-card modal-card-compact close-confirm-card"
          role="dialog"
          aria-modal="true"
          aria-labelledby="close-confirm-title"
          aria-describedby="close-confirm-body"
        >
          <header class="modal-header close-confirm-header">
            <div class="close-confirm-intro">
              <div class="close-confirm-badge brand-mark-frame brand-mark-frame-compact" aria-hidden="true">
                <img src="./assets/chatdock-logo.png" alt="ChatDock logo" class="brand-mark-logo brand-mark-logo-compact" />
              </div>
              <span class="close-confirm-kicker">先确认一下</span>
            </div>
            <div class="close-confirm-copy">
              <h2 id="close-confirm-title">确认关闭 ChatDock</h2>
              <p id="close-confirm-body">当前窗口关闭后，本次工作台布局会保留，下次打开可继续使用。</p>
            </div>
          </header>
          <div class="close-confirm-note" aria-hidden="true">
            <span class="close-confirm-note-pill">布局会保留</span>
            <span class="close-confirm-note-text">下次打开还能从现在的位置继续。</span>
          </div>
          <div class="close-confirm-actions">
            <button type="button" id="cancel-close-confirm" class="ghost-button">再看看</button>
            <button type="button" id="accept-close-confirm" class="tour-next close-confirm-accept">确认关闭</button>
          </div>
        </section>
      </div>

      <div id="about-dialog" class="modal-shell" hidden>
        <div class="modal-backdrop" data-close-about-backdrop="true"></div>
        <section
          class="modal-card modal-card-compact about-card"
          role="dialog"
          aria-modal="true"
          aria-labelledby="about-title"
          aria-describedby="about-body"
        >
          <header class="modal-header about-header">
            <button type="button" id="close-about" class="ghost-button modal-close">关闭</button>
          </header>
          <div class="about-body">
            <div class="about-hero">
              <div class="about-mark brand-mark-frame" aria-hidden="true">
                <img src="./assets/chatdock-logo.png" alt="ChatDock logo" class="brand-mark-logo" />
              </div>
              <div class="about-copy">
                <p class="about-kicker">Desktop AI Workspace</p>
                <h2 id="about-title">ChatDock</h2>
                <p id="about-body">把多个 AI 聊天窗口收进一个工作台，在一个窗口里统一提问、并排比较。</p>
              </div>
            </div>
            <a
              class="about-link"
              href="https://github.com/orangebom/ChatDock"
              target="_blank"
              rel="noreferrer"
            >
              <span class="about-link-label">GitHub 仓库</span>
              <span class="about-link-value">github.com/orangebom/ChatDock</span>
              <span class="about-link-arrow" aria-hidden="true">↗</span>
            </a>
          </div>
        </section>
      </div>

      <div id="onboarding" class="tour-shell" hidden>
        <div class="tour-shade tour-shade-top"></div>
        <div class="tour-shade tour-shade-left"></div>
        <div class="tour-shade tour-shade-right"></div>
        <div class="tour-shade tour-shade-bottom"></div>
        <div id="tour-focus" class="tour-focus" hidden></div>
        <section
          id="tour-card"
          class="tour-card"
          role="dialog"
          aria-modal="true"
          aria-labelledby="tour-title"
        >
          <div class="tour-stepline">
            <span class="tour-kicker">首次使用指引</span>
            <span id="tour-progress" class="tour-progress"></span>
          </div>
          <h2 id="tour-title"></h2>
          <p id="tour-body"></p>
          <div id="tour-dots" class="tour-dots" aria-hidden="true"></div>
          <div class="tour-actions">
            <button type="button" id="tour-skip" class="ghost-button">跳过</button>
            <div class="tour-nav">
              <button type="button" id="tour-prev" class="ghost-button">上一步</button>
              <button type="button" id="tour-next" class="tour-next">下一步</button>
            </div>
          </div>
        </section>
      </div>

      <div id="target-context-menu" class="context-menu-shell" hidden>
        <div class="context-menu-backdrop" data-close-target-context-menu="true"></div>
        <section
          class="context-menu"
          role="menu"
          aria-labelledby="target-context-title"
        >
          <div id="target-context-title" class="context-menu-title">AI 操作</div>
          <button type="button" class="context-menu-item" data-context-action="test-connectivity" role="menuitem">
            测试连通
          </button>
          <button type="button" class="context-menu-item context-menu-item-danger" data-context-action="remove" role="menuitem">
            移除
          </button>
        </section>
      </div>
    </main>
  </body>
</html>
