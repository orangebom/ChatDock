<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>布局选择</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: rgba(20, 27, 41, 0.97);
        --border: rgba(118, 136, 171, 0.2);
        --text: #edf3ff;
        --text-dim: #bfd0ea;
        --hover: rgba(173, 198, 255, 0.08);
        --active: rgba(173, 198, 255, 0.14);
        --accent: #adc6ff;
      }

      :root[data-theme="light"] {
        color-scheme: light;
        --bg: rgba(255, 255, 255, 0.97);
        --border: rgba(108, 128, 168, 0.18);
        --text: #162844;
        --text-dim: #526b8e;
        --hover: rgba(77, 142, 255, 0.1);
        --active: rgba(77, 142, 255, 0.14);
        --accent: #2d63c8;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
        overflow: hidden;
        background: transparent;
        font-family: "Inter", "Segoe UI", sans-serif;
      }

      body {
        padding: 0;
      }

      .dropdown {
        width: 100%;
        min-height: 100%;
        display: grid;
        gap: 4px;
        padding: 8px;
        border: 1px solid var(--border);
        border-radius: 14px;
        background: var(--bg);
        box-shadow:
          0 18px 34px rgba(3, 8, 16, 0.34),
          inset 0 1px 0 rgba(255, 255, 255, 0.06);
        backdrop-filter: blur(16px);
        -webkit-backdrop-filter: blur(16px);
      }

      :root[data-theme="light"] .dropdown {
        box-shadow:
          0 18px 34px rgba(156, 170, 197, 0.18),
          inset 0 1px 0 rgba(255, 255, 255, 0.92);
      }

      .option {
        min-height: 34px;
        width: 100%;
        display: inline-flex;
        align-items: center;
        justify-content: flex-start;
        padding: 0 10px;
        border: 0;
        border-radius: 9px;
        color: var(--text);
        background: transparent;
        font-size: 12px;
        font-weight: 800;
        text-align: left;
        cursor: pointer;
      }

      .option:hover,
      .option:focus-visible {
        outline: none;
        background: var(--hover);
      }

      .option.active {
        color: var(--accent);
        background: var(--active);
      }
    </style>
  </head>
  <body>
    <section id="layout-preset-dropdown-list" class="dropdown" role="listbox" aria-label="选择布局"></section>

    <script type="module">
      const { event } = window.__TAURI__;
      const list = document.querySelector("#layout-preset-dropdown-list");
      let state = {
        theme: "dark",
        activePresetId: "",
        presets: [],
      };

      function render() {
        document.documentElement.dataset.theme = state.theme === "light" ? "light" : "dark";
        list.innerHTML = "";

        for (const preset of state.presets) {
          const button = document.createElement("button");
          button.type = "button";
          button.className = `option${preset.id === state.activePresetId ? " active" : ""}`;
          button.setAttribute("data-layout-preset-id", preset.id);
          button.setAttribute("role", "option");
          button.setAttribute("aria-selected", preset.id === state.activePresetId ? "true" : "false");
          button.textContent = preset.name;
          list.appendChild(button);
        }
      }

      list.addEventListener("click", async (eventObject) => {
        const presetId = eventObject.target?.dataset?.layoutPresetId;
        if (!presetId) {
          return;
        }

        await event.emit("layout-preset-dropdown-action", {
          action: "apply",
          presetId,
        });
      });

      window.addEventListener("blur", () => {
        window.setTimeout(() => {
          void event.emit("layout-preset-dropdown-action", {
            action: "close",
          });
        }, 120);
      });

      await event.listen("layout-preset-dropdown-state", ({ payload }) => {
        state = {
          theme: payload?.theme || "dark",
          activePresetId: payload?.activePresetId || "",
          presets: Array.isArray(payload?.presets) ? payload.presets : [],
        };
        render();
      });

      render();
    </script>
  </body>
</html>
